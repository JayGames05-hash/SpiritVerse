name: iOS TestFlight Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-upload:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max_old_space_size=4096"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install dependencies
        run: |
          npm ci

      - name: Export Next.js to static
        run: |
          npm run export

      - name: Install Capacitor CLI
        run: |
          npm install --no-audit --no-fund @capacitor/cli @capacitor/ios

      - name: Initialize Capacitor (if needed)
        run: |
          npx cap init CopticDaily com.coptic.daily --web-dir=out || true

      - name: Add iOS platform
        run: |
          npx cap add ios --no-sync || true

      - name: Sync Capacitor
        run: |
          npx cap sync ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App && pod install --repo-update

      - name: Build iOS archive
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath $PWD/build/App.xcarchive archive CODE_SIGN_STYLE=Automatic
          xcodebuild -exportArchive -archivePath $PWD/build/App.xcarchive -exportPath $PWD/build/App -exportOptionsPlist exportOptions.plist || true

      - name: Upload to TestFlight via Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          gem install fastlane -v 2.226.0
          cd ios/App
          fastlane ios beta

